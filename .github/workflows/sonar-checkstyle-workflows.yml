---
name: Verify

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  mvn-install:
    name: Maven Install
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        java-version: ['21']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin

      - run: |
          mvn -e --no-transfer-progress clean install

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        java-version: ['21']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin

      - run: |
          mvn -e --no-transfer-progress verify -DskipITs=false -Pintegration-tests

  nondex:
    name: Maven Nondex
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        java-version: ['21']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin

      - run: |
          mvn -e --no-transfer-progress --fail-never clean nondex:nondex -Dcheckstyle.ant.skip=true
      - run: |
          set -eu
          files=$(grep -RlE "td class=.x" .nondex/ || true)
          if [ -n "$files" ]; then
            # read filenames safely and concatenate
            while IFS= read -r f; do
              cat "$f"
            done <<<"$files" > output.txt
          else
            : > output.txt
          fi
          cat output.txt
      - run: |
          RESULT="$(cat output.txt | wc -c)"
          echo 'Size of output:'${RESULT}
          if [[ "$RESULT" != 0 ]]; then false; fi

  execute-sonarqube-plugin:
    name: Execute SonarQube Plugin
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      matrix:
        java-version: ['21']
        sq-version: ['latest', '25.2.0.102705-community']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin

      - run: |
          mvn -e --no-transfer-progress clean package -Pno-validations

      - name: Run SonarQube
        run: |
          docker run -d --name sonarqube -p 9000:9000 -v ${{ github.workspace }}/target/:/opt/sonarqube/extensions/plugins/ sonarqube:${{ matrix.sq-version }}
          timeout 300 bash -c 'until curl -s http://localhost:9000/api/system/status | grep -q "UP"; do echo "Waiting..."; sleep 5; done'

      - name: Generate SonarQube token
        run: |
          SONAR_TOKEN=$(curl -s -u admin:admin -X POST "http://localhost:9000/api/user_tokens/generate?name=github-actions" | python3 -c "import json,sys; print(json.load(sys.stdin)['token'])")
          if [ -z "$SONAR_TOKEN" ]; then
            echo "Failed to generate SonarQube token"
            exit 1
          fi
          echo "SONAR_TOKEN=$SONAR_TOKEN" >> "$GITHUB_ENV"

      - run: |
          mvn -e --no-transfer-progress sonar:sonar -Dsonar.host.url=http://localhost:9000 -Dsonar.token=$SONAR_TOKEN
      - run: |
          if docker logs sonarqube | grep -q "ERROR"; then
            echo "SonarQube logs contain ERROR"
            exit 1
          fi
    
      - if: always()
        run: docker stop sonarqube || true
